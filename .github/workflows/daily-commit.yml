name: Daily Commit

on:
  schedule:
    - cron: '30 5 * * *'   # Runs daily at 05:30 UTC
  workflow_dispatch:         # Allow manual trigger

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 23f1002778@ds.study.iitm.ac.in - Update daily log
        run: |
          echo "Daily run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> daily_log.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_log.txt
          git commit -m "chore: daily automated commit $(date -u '+%Y-%m-%d')"
          git push
